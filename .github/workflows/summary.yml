name: Daily WhatsApp Summary

on:
  workflow_dispatch: {}
  schedule:
    # 12:00 UTC = 8h da manhã em Orlando no horário de verão (EDT).
    # No horário de inverno (EST) chega às 7h. Cron do Actions é sempre UTC.
    - cron: "0 12 * * *"

permissions:
  contents: read

jobs:
  summary:
    name: Send daily summary
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONUNBUFFERED: "1"
      ZAPI_INSTANCE_ID: ${{ secrets.ZAPI_INSTANCE_ID }}
      ZAPI_INSTANCE_TOKEN: ${{ secrets.ZAPI_INSTANCE_TOKEN }}
      ZAPI_CLIENT_TOKEN: ${{ secrets.ZAPI_CLIENT_TOKEN }}
      ZAPI_PHONE: ${{ secrets.ZAPI_PHONE }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore state from data branch
        shell: bash
        run: |
          # O resumo lê os CSVs que a varredura grava no branch 'data'.
          if git fetch origin data 2>/dev/null; then
            git checkout origin/data -- state/ 2>/dev/null || true
            if [ -d state ]; then
              cp -n state/* . 2>/dev/null || true
              git restore --staged state 2>/dev/null || true
              rm -rf state
              echo "estado restaurado do branch data"
            fi
          fi

      - name: Set dashboard URL
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY%/*}"
          name="${GITHUB_REPOSITORY#*/}"
          echo "DASHBOARD_URL=https://${owner,,}.github.io/${name}/" >> "$GITHUB_ENV"

      - name: Send summary
        run: python -m src.summary
