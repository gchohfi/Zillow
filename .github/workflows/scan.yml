name: Orlando Land Scan

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rodar sem enviar WhatsApp/e-mail/Telegram"
        required: false
        default: false
        type: boolean
  schedule:
    # De hora em hora, em UTC.
    - cron: "0 * * * *"

concurrency:
  group: orlando-land-scan
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scan:
    name: Scan land listings
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      PYTHONUNBUFFERED: "1"
      RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}
      ZAPI_INSTANCE_ID: ${{ secrets.ZAPI_INSTANCE_ID }}
      ZAPI_INSTANCE_TOKEN: ${{ secrets.ZAPI_INSTANCE_TOKEN }}
      ZAPI_CLIENT_TOKEN: ${{ secrets.ZAPI_CLIENT_TOKEN }}
      ZAPI_PHONE: ${{ secrets.ZAPI_PHONE }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore scanner memory
        uses: actions/cache/restore@v4
        with:
          path: |
            seen_listings.db
            seen_listings.db-*
            opportunities.csv
            evaluations.csv
          key: orlando-land-state-${{ github.run_id }}
          restore-keys: |
            orlando-land-state-

      - name: Check required secrets
        shell: bash
        run: |
          missing=0
          if [ -z "${RENTCAST_API_KEY:-}" ]; then
            echo "::error::Configure o secret RENTCAST_API_KEY em Settings > Secrets and variables > Actions."
            missing=1
          fi
          if [ -z "${ZAPI_INSTANCE_ID:-}" ] || [ -z "${ZAPI_INSTANCE_TOKEN:-}" ] || [ -z "${ZAPI_PHONE:-}" ]; then
            echo "::warning::Secrets da Z-API incompletos; o scanner pode rodar, mas WhatsApp nao sera enviado."
          fi
          exit "$missing"

      - name: Set dashboard URL
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY%/*}"
          name="${GITHUB_REPOSITORY#*/}"
          echo "DASHBOARD_URL=https://${owner,,}.github.io/${name}/" >> "$GITHUB_ENV"

      - name: Run scanner
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m src.main --dry-run
          else
            python -m src.main
          fi

      - name: Build dashboard site
        if: always()
        run: python -m src.site

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard to Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy dashboard to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Save scanner memory
        if: ${{ always() && hashFiles('seen_listings.db') != '' }}
        uses: actions/cache/save@v4
        with:
          path: |
            seen_listings.db
            seen_listings.db-*
            opportunities.csv
            evaluations.csv
          key: orlando-land-state-${{ github.run_id }}

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orlando-land-scan-${{ github.run_id }}
          path: |
            opportunities.csv
            evaluations.csv
            seen_listings.db
          if-no-files-found: ignore
          retention-days: 14
