name: Orlando Land Scan

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rodar sem enviar WhatsApp/e-mail/Telegram"
        required: false
        default: false
        type: boolean
  schedule:
    # De hora em hora, em UTC.
    - cron: "0 * * * *"

concurrency:
  group: orlando-land-scan
  cancel-in-progress: false

permissions:
  contents: write   # branch 'data' guarda a memória do scanner entre rodadas
  pages: write
  id-token: write

jobs:
  scan:
    name: Scan land listings
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      PYTHONUNBUFFERED: "1"
      RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}
      ZAPI_INSTANCE_ID: ${{ secrets.ZAPI_INSTANCE_ID }}
      ZAPI_INSTANCE_TOKEN: ${{ secrets.ZAPI_INSTANCE_TOKEN }}
      ZAPI_CLIENT_TOKEN: ${{ secrets.ZAPI_CLIENT_TOKEN }}
      ZAPI_PHONE: ${{ secrets.ZAPI_PHONE }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore scanner memory
        uses: actions/cache/restore@v4
        with:
          path: |
            seen_listings.db
            seen_listings.db-*
            region_signals.db
            region_signals.db-*
            opportunities.csv
            evaluations.csv
          key: orlando-land-state-${{ github.run_id }}
          restore-keys: |
            orlando-land-state-

      - name: Restore state from data branch (fallback)
        shell: bash
        run: |
          # O cache do Actions pode ser despejado (~7 dias sem uso). O branch
          # 'data' é a cópia permanente: se o cache falhou, restaura de lá e
          # evita uma enxurrada de alertas repetidos.
          if [ ! -f seen_listings.db ] && git fetch origin data 2>/dev/null; then
            git checkout origin/data -- state/ 2>/dev/null || true
            if [ -d state ]; then
              cp -n state/* . 2>/dev/null || true
              git restore --staged state 2>/dev/null || true
              rm -rf state
              echo "estado restaurado do branch data"
            fi
          fi

      - name: Check required secrets
        shell: bash
        run: |
          missing=0
          if [ -z "${RENTCAST_API_KEY:-}" ]; then
            echo "::error::Configure o secret RENTCAST_API_KEY em Settings > Secrets and variables > Actions."
            missing=1
          fi
          if [ -z "${ZAPI_INSTANCE_ID:-}" ] || [ -z "${ZAPI_INSTANCE_TOKEN:-}" ] || [ -z "${ZAPI_PHONE:-}" ]; then
            echo "::warning::Secrets da Z-API incompletos; o scanner pode rodar, mas WhatsApp nao sera enviado."
          fi
          exit "$missing"

      - name: Set dashboard URL
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY%/*}"
          name="${GITHUB_REPOSITORY#*/}"
          echo "DASHBOARD_URL=https://${owner,,}.github.io/${name}/" >> "$GITHUB_ENV"

      - name: Run scanner
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m src.main --dry-run
          else
            python -m src.main
          fi

      - name: Build dashboard site
        if: always()
        run: python -m src.site

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard to Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy dashboard to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Save scanner memory
        if: ${{ always() && hashFiles('seen_listings.db') != '' }}
        uses: actions/cache/save@v4
        with:
          path: |
            seen_listings.db
            seen_listings.db-*
            region_signals.db
            region_signals.db-*
            opportunities.csv
            evaluations.csv
          key: orlando-land-state-${{ github.run_id }}

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orlando-land-scan-${{ github.run_id }}
          path: |
            opportunities.csv
            evaluations.csv
            seen_listings.db
          if-no-files-found: ignore
          retention-days: 14

      - name: Alert on workflow failure (WhatsApp)
        if: ${{ failure() }}
        shell: bash
        run: |
          # Silêncio deve significar "sem oportunidade", nunca "sistema quebrado".
          if [ -n "${ZAPI_INSTANCE_ID:-}" ] && [ -n "${ZAPI_INSTANCE_TOKEN:-}" ] && [ -n "${ZAPI_PHONE:-}" ]; then
            run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            payload=$(printf '{"phone":"%s","message":"[Orlando Land] ALERTA: a varredura #%s FALHOU. Verifique: %s"}' \
              "$ZAPI_PHONE" "${{ github.run_number }}" "$run_url")
            headers=(-H "Content-Type: application/json")
            [ -n "${ZAPI_CLIENT_TOKEN:-}" ] && headers+=(-H "Client-Token: ${ZAPI_CLIENT_TOKEN}")
            curl -sS -X POST "${headers[@]}" -d "$payload" \
              "https://api.z-api.io/instances/${ZAPI_INSTANCE_ID}/token/${ZAPI_INSTANCE_TOKEN}/send-text" || true
          fi

      - name: Persist state to data branch
        if: ${{ always() && hashFiles('seen_listings.db') != '' }}
        shell: bash
        run: |
          # Último passo do job: troca de branch é segura porque nada mais
          # roda depois. Guarda a memória do scanner de forma permanente.
          set -e
          mkdir -p /tmp/state
          for f in seen_listings.db region_signals.db opportunities.csv evaluations.csv; do
            [ -f "$f" ] && cp "$f" /tmp/state/
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git fetch origin data 2>/dev/null; then
            git checkout -f -B data origin/data
          else
            git checkout --orphan data
            git rm -rf --quiet . 2>/dev/null || true
          fi
          mkdir -p state
          cp /tmp/state/* state/
          git add -f state
          if git commit -m "Atualizar estado do scanner ($(date -u +%Y-%m-%dT%H:%MZ))"; then
            git push origin data
          else
            echo "estado sem mudanças; nada a publicar"
          fi
