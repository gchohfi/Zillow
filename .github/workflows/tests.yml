name: Tests

on:
  push:
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: Run pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Ruff format
        run: >-
          python -m ruff format --check
          src/main.py src/storage.py src/reporter.py src/notifier.py
          tests/test_main.py tests/test_storage.py tests/test_reporter.py
          tests/test_mock_seen_store_scope.py tests/test_notifier.py

      - name: Pyright
        run: python -m pyright

      - name: Dependency audit
        run: python -m pip_audit --cache-dir /tmp/pip-audit -r requirements.txt

      - name: Tests with coverage
        run: >-
          python -m pytest -q
          --cov=src
          --cov-report=term-missing
          --cov-fail-under=75
