# ============================================================================
#  A SUA FÓRMULA — edite estes números conforme o seu negócio e a sua região.
# ============================================================================

# ---- Área de busca ----
search:
  center_lat: 28.5384          # Orlando, FL
  center_lng: -81.3789
  radius_km: 80                # raio de busca inicial: ~50 milhas de Orlando
  property_types:              # tipos de listagem que interessam
    - land
    - lots-land

# ---- Premissas de construção (spec build) ----
build:
  living_area_sqft: 2000       # tamanho da casa que você pretende construir
  construction_cost_per_sqft: 165   # custo de construção por sqft (USD) na região
  resale_price_per_sqft: 330        # valor de revenda por sqft da casa pronta (ARV)
  # OBS: na Fase 2/3, resale_price_per_sqft pode ser substituído por comps reais.

# ---- Custos adicionais (frações) ----
costs:
  soft_cost_pct: 0.10          # projeto, licenças, taxas (% sobre o custo de construção)
  purchase_closing_pct: 0.02   # closing costs da compra do terreno (% sobre o terreno)
  contingency_pct: 0.07        # contingência da obra (% sobre o custo de construção)
  carrying_cost_annual_pct: 0.09  # juros + IPTU + seguro anualizados (% sobre terreno+obra)
  carrying_months: 12          # prazo estimado do projeto para custo de carrego
  selling_cost_pct: 0.07       # comissão de corretor + closing (% sobre o ARV)
  # AJUSTE COM SEUS NÚMEROS (estimativas de mercado de Central FL; 0 desliga):
  site_prep_cost: 15000        # preparação do lote: limpeza, aterro, conexões, driveway (USD)
  impact_fees: 20000           # taxas de impacto do county por unidade (USD)

# ---- Custos por county (sobrepõem o segmento quando o ZIP é conhecido) ----
# As tabelas de impact fees variam muito entre os counties da região.
# CALIBRE com os valores reais que a empresa paga; ZIPs fora da lista usam
# os valores do segmento acima.
county_costs:
  counties:
    orange:   { impact_fees: 25000 }
    osceola:  { impact_fees: 30000 }   # historicamente as mais altas da região
    seminole: { impact_fees: 15000 }
    lake:     { impact_fees: 15000 }
    polk:     { impact_fees: 12000 }
    volusia:  { impact_fees: 12000 }
  zip_to_county:
    # Orange
    "32703": orange
    "32712": orange
    "32789": orange
    "32792": orange
    "32801": orange
    "32805": orange
    "32808": orange
    "32810": orange
    "32819": orange
    "32822": orange
    "32824": orange
    "32827": orange
    "32832": orange
    "32836": orange
    "34761": orange
    "34786": orange
    "34787": orange
    # Seminole
    "32771": seminole
    # Osceola
    "33896": osceola
    "34741": osceola
    "34744": osceola
    "34746": osceola
    "34747": osceola
    "34758": osceola
    "34769": osceola
    "34771": osceola
    "34772": osceola
    "34773": osceola
    # Lake
    "34711": lake
    "34714": lake
    "34715": lake
    "34748": lake
    # Polk
    "33801": polk
    "33880": polk
    "33897": polk
    # Volusia
    "32114": volusia
    "32713": volusia
    "32720": volusia
    "32724": volusia

# ---- Cenário pessimista (análise de sensibilidade) ----
# Cada oportunidade também mostra lucro/margem com ARV menor e obra mais cara.
# Margem negativa no pessimista vira atenção no alerta (não bloqueia).
stress:
  arv_drop_pct: 0.10           # ARV 10% menor
  construction_rise_pct: 0.10  # obra 10% mais cara

# ---- ARV por comps reais (RentCast AVM) ----
# Para terreno, o ARV deve estimar a casa pronta hipotética, não o lote.
# Se a AVM falhar ou tiver poucos comps, o sistema volta para resale_price_per_sqft.
arv:
  enabled: true
  provider: rentcast_avm
  path: /avm/value
  property_type: Single Family
  max_radius_miles: 2
  days_old: 180
  comp_count: 10
  min_comps: 5                 # menos que isso, volta para a premissa fixa
  cap_confidences: [low]       # com confiança baixa, o ARV fica limitado à premissa
  divergence_warn_pct: 0.15    # comps divergindo >15% da premissa vira atenção
  timeout_seconds: 20

# ---- Regras de corte (o que é "viável") ----
rules:
  target_margin: 0.18          # margem líquida mínima (lucro / ARV)
  max_land_price: 0            # teto global desligado; cada segmento define o seu
  max_land_to_total_investment_pct: 0.27  # terreno não pode passar de 27% do investimento total
  require_residential_zoning: true   # exige zoneamento residencial
  require_known_zoning: true         # se o zoneamento vier vazio, segura para análise manual
  residential_zoning_hints:          # padrões aceitos como uso residencial
    - residential
    - single family
    - single-family
    - sfr
    - rsf
    - rs-
    - r-1
    - r1
    - r-2
    - r2
    - r-3
    - r3
    - pud
    - planned unit development
  prohibited_zoning_hints:           # padrões que bloqueiam alerta automático
    - commercial
    - industrial
    - office
    - retail
    - warehouse
    - conservation
    - wetland
    - agricultural
  min_lot_size_sqft: 5000      # lote mínimo em sqft (0 ou nulo = sem mínimo)

# ---- Disponibilidade antes do alerta ----
# Filtro defensivo para reduzir imóveis que aparecem como vendidos/off-market
# quando conferidos no Zillow. Não faz scraping do Zillow; usa dados estruturados
# da fonte e segura anúncios antigos/suspeitos antes do WhatsApp.
availability:
  require_status_active: true
  allowed_statuses: [Active]
  reject_removed: true
  max_last_seen_hours: 48
  max_listed_age_days: 7
  require_mls_number: false   # sem MLS vira atenção no alerta, não descarte silencioso

# ---- Red flags de due diligence antes do alerta ----
red_flags:
  flood:
    enabled: true
    provider: fema_nfhl
    # FEMA National Flood Hazard Layer. A consulta é por ponto (lat/lng).
    query_url: https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer/28/query
    timeout_seconds: 12
    fail_open: true          # se FEMA falhar, não perde oportunidade; só marca atenção
    block_high_risk: false   # por enquanto alerta, mas destaca AE/VE/SFHA como red flag
    high_risk_zones: [A, AE, AH, AO, AR, A99, V, VE]

# ---- Confirmação de zoneamento/uso do solo via GIS público ----
# Quando a listagem vem sem zoneamento, consulta camadas ArcGIS públicas por
# ponto e preenche o zoneamento antes da avaliação: residencial confirmado
# vira oportunidade; comercial/industrial confirmado é reprovado; falha de
# GIS mantém o comportamento atual (Radar). As fontes são tentadas em ordem
# e novas (ex.: GIS de county) podem ser adicionadas aqui sem mexer no código.
zoning_lookup:
  enabled: true
  cache_db: region_signals.db   # tabela própria dentro do mesmo arquivo
  cache_days: 90
  timeout_seconds: 30           # cadastro estadual é grande; consultas frias demoram
  sources:
    - name: fl_parcelas_estaduais
      # Cadastro estadual da Flórida (FGIO/FDOR, ~10,8 mi de parcelas) com
      # códigos de uso DOR padronizados. Se a URL mudar, basta atualizar aqui.
      query_url: https://services9.arcgis.com/Gh9awoU677aKree0/arcgis/rest/services/Florida_Statewide_Cadastral/FeatureServer/0/query
      fields: [PARUSEDESC, PAR_USE_DESC, DOR_UC]   # texto primeiro; código DOR como reserva

# ---- Radar de revisão manual ----
# Não transforma em "oportunidade viável"; só manda para conferência quando os
# números passam e o bloqueio é due diligence (ex.: zoneamento desconhecido).
radar:
  enabled: true
  send_whatsapp: true
  max_candidates: 10
  include_unknown_zoning: true
  include_manual_review_segments: true
  include_high_flood_risk: true

# ---- Sinais de crescimento da região (dashboard + WhatsApp) ----
# Fontes gratuitas: OpenStreetMap (escolas/comércio próximos) e US Census ACS
# (crescimento de população e renda por ZIP em 5 anos). Falha de API nunca
# bloqueia alerta; os sinais ficam em cache por ZIP porque mudam devagar.
region_signals:
  enabled: true
  cache_db: region_signals.db
  cache_days: 30               # revalida os sinais de cada ZIP a cada N dias
  radius_km: 3                 # raio para contar escolas/comércio
  census_latest_year: 2023     # ACS 5 anos mais recente
  census_base_year: 2018       # base de comparação (5 anos antes)
  timeout_seconds: 25
  prefetch_thesis_zips: true   # pré-carrega os ZIPs das regiões-alvo (1x, fica em cache)
  prefetch_pause_seconds: 1.1  # pausa entre geocodificações (política do Nominatim)
  fetch_pause_seconds: 1.0     # pausa entre ZIPs (limites das APIs públicas)
  failure_retry_hours: 6       # ZIP com busca falha volta a ser tentado após N horas
  census_state_fips: "12"      # Flórida; exigido pelos vintages ACS até 2019
  overpass_urls:               # espelhos tentados em ordem
    - https://overpass-api.de/api/interpreter
    - https://overpass.kumi.systems/api/interpreter

# ---- Tese de mercado por ZIP/região ----
# Pontuação baseada no relatório Arwell Orlando Market Research.
# Essa camada não substitui underwriting; ela prioriza o que aparece no WhatsApp/CSV.
market_strategy:
  default_priority: "fora da tese principal"
  default_score: 0
  zip_groups:
    - name: lake_nona_narcoossee_airport
      label: "Lake Nona / Narcoossee / Airport South / Sunbridge"
      priority: "Alta"
      score: 10
      zips: ["32827", "32832", "34771"]
      strategies: ["townhomes premium", "SFR/BTR", "land banking", "flex/light industrial"]
      risk_flags: ["checar basis alto", "checar entitlements/utilities", "checar airport/noise overlay"]

    - name: horizon_west_winter_garden_ocoee
      label: "Horizon West / Winter Garden / Ocoee"
      priority: "Alta"
      score: 9
      zips: ["34787", "34786", "34761", "32836"]
      strategies: ["townhomes", "SFR rentals", "BTR", "small multifamily"]
      risk_flags: ["checar HOA/CDD", "checar school capacity", "evitar STR sem zoning letter"]

    - name: minneola_clermont
      label: "Minneola / Clermont / Lake County Turnpike"
      priority: "Alta"
      score: 8.5
      zips: ["34715", "34711", "34714"]
      strategies: ["land banking", "finished lots", "SFR", "BTR"]
      risk_flags: ["checar utilities/Turnpike access", "checar impact fees", "checar municipality/county boundary"]

    - name: st_cloud_neocity
      label: "St. Cloud / NeoCity / East Osceola"
      priority: "Alta"
      score: 8.5
      zips: ["34769", "34772", "34773", "34744"]
      strategies: ["workforce housing", "SFR/BTR", "townhomes", "land banking"]
      risk_flags: ["checar sewer path", "checar commute real", "checar absorcao/supply"]

    - name: str_core
      label: "Kissimmee / Four Corners / Davenport / ChampionsGate"
      priority: "Alta com cautela"
      score: 7.5
      zips: ["34747", "34746", "33896", "33897", "34741", "34758"]
      strategies: ["STR legal-by-address", "vacation townhomes", "SFR hybrid"]
      risk_flags: ["checar STR legality por endereco", "checar HOA/CDD", "checar saturacao e P&L real"]

    - name: workforce_value_add
      label: "Workforce / value-add suburbano"
      priority: "Média"
      score: 7
      zips: ["32822", "32824", "32808", "32810", "32805", "32771", "32703"]
      strategies: ["SFR rentals", "small multifamily", "workforce housing", "value-add"]
      risk_flags: ["checar seguranca bloco-a-bloco", "checar tax reset/insurance", "checar liquidez de saida"]

    - name: monitorar_tod_land
      label: "Apopka / DeBary / DeLand / SunRail-TOD"
      priority: "Monitorar"
      score: 6.5
      zips: ["32712", "32713", "32720", "32724"]
      strategies: ["land banking", "TOD", "townhomes", "workforce rentals"]
      risk_flags: ["horizonte mais longo", "checar absorcao", "checar utilities e access roads"]

    - name: premium_infill
      label: "Winter Park / Dr. Phillips / premium infill"
      priority: "Seletiva"
      score: 6.5
      zips: ["32789", "32792", "32819"]
      strategies: ["premium SFR", "luxury infill", "small multifamily seletivo"]
      risk_flags: ["basis alto", "margem depende de compra com desconto", "STR somente com validacao legal"]

# ---- Resumo diário por e-mail ----
summary:
  period_hours: 24             # janela do resumo (últimas N horas do CSV)

# ============================================================================
#  SEGMENTOS / PADRÕES — cada oportunidade é classificada pela faixa de preço,
#  e cada segmento pode ter a SUA PRÓPRIA fórmula (build/costs/rules).
#  A listagem cai no PRIMEIRO segmento cujo 'max_price' >= preço do imóvel.
#  Sem override, o segmento usa os padrões definidos lá em cima.
# ============================================================================
tiers:
  - name: baixo_padrao
    label: "Baixo padrão"
    max_price: 50000           # terrenos até US$ 50.000
    build:
      living_area_sqft: 1400
      bedrooms: 3
      bathrooms: 2
      construction_cost_per_sqft: 120
      resale_price_per_sqft: 225   # ARV crítico aproximado: US$ 315.000
    costs:
      site_prep_cost: 25000    # lote barato costuma ser rural: poço/fossa mais prováveis
      impact_fees: 15000       # counties rurais tendem a cobrar menos
    rules:
      max_land_price: 50000
      target_margin: 0.18

  - name: medio_padrao
    label: "Médio padrão"
    max_price: 300000          # oportunidades até US$ 300.000 entram em outra régua
    build:
      living_area_sqft: 2200
      bedrooms: 4
      bathrooms: 3
      construction_cost_per_sqft: 165
      resale_price_per_sqft: 330
    rules:
      target_margin: 0.18
      min_lot_size_sqft: 7000  # casa de 2200 sqft + recuos não cabe em lote menor

  - name: alto_padrao
    label: "Alto padrão"
    max_price: null            # acima de US$ 300.000
    build:
      living_area_sqft: 4000
      bedrooms: 5
      bathrooms: 4
      construction_cost_per_sqft: 250
      resale_price_per_sqft: 520
    costs:
      selling_cost_pct: 0.08
      site_prep_cost: 30000    # lote premium: paisagismo/preparação mais caros
    rules:
      target_margin: 0.22
      min_lot_size_sqft: 12000
      manual_review_only: true # alto padrão depende de bairro/demanda, não só do número

# ---- Banco de dados (memória do que já foi visto) ----
storage:
  db_path: seen_listings.db

# ---- Saída em planilha ----
output:
  csv_path: opportunities.csv   # oportunidades viáveis são acrescentadas aqui
  evaluations_csv_path: evaluations.csv  # toda listagem nova avaliada, viável ou não

# ---- Dashboard estático publicável (GitHub Pages) ----
site:
  dir: site                    # diretório onde o index.html é gerado
  period_days: 30              # janela de avaliações exibida no dashboard

# ---- Notificações operacionais ----
notifications:
  whatsapp_run_summary:
    enabled: true               # envia resumo da rodada mesmo sem oportunidade viável

# ============================================================================
#  FONTE DE DADOS — use RentCast para teste/produção leve, RapidAPI como fallback.
#  Use --mock para testar sem chave nenhuma.
# ============================================================================
datasource:
  provider: rentcast      # "rentcast", "realtor_rapidapi" ou "mock"

  rentcast:
    # ----------------------------------------------------------------------
    #  API oficial da RentCast.
    #  Cole a chave em RENTCAST_API_KEY no .env.
    #  Endpoint: GET /listings/sale
    # ----------------------------------------------------------------------
    base_url: https://api.rentcast.io/v1
    search_path: /listings/sale
    property_type: Land
    status: Active
    limit: 100
    max_pages: 3               # até 300 listagens por rodada (era 100)
    timeout_seconds: 60
    retries: 2
    retry_sleep_seconds: 3

    # Parâmetros opcionais aceitos pela RentCast. Para capturar oportunidades
    # recentes sem gastar chamadas demais, comece com poucos dias e ajuste.
    params:
      daysOld: "0-7"

    # Para a primeira peneira usamos ~50 milhas / 80 km de Orlando.
    # Se voltar para 180 km, reative pontos sobrepostos ao redor da região.
    search_points:
      - name: Orlando
        lat: 28.5384
        lng: -81.3789
        radius_miles: 50

  rapidapi:
    # ----------------------------------------------------------------------
    #  Configurado para a API "US Real Estate Listings" by apimaker.
    #  Cole a chave em RAPIDAPI_KEY no .env.
    # ----------------------------------------------------------------------
    host: us-real-estate-listings.p.rapidapi.com
    base_url: https://us-real-estate-listings.p.rapidapi.com
    method: GET
    search_path: /forSale
    zip_param: zip

    # Parâmetros da query. {lat} {lng} {radius_km} {radius_miles} são
    # preenchidos em tempo de execução.
    #
    # IMPORTANTE sobre o RAIO: esta API costuma limitar 'radius' a ~50 milhas
    # (~80 km) a partir de um postal_code. Por isso usamos um CEP central de
    # Orlando + raio 50, e o GEOFILTRO do próprio sistema (search.radius_km =
    # 180) faz o corte preciso. Para cobrir os 180 km inteiros, dá para buscar
    # em vários CEPs centrais e juntar — me peça que eu adiciono.
    params:
      zip: "32801"                # CEP padrão (usado se postal_codes abaixo ficar vazio)

    # ---- Busca multi-CEP (cobre os ~180 km ao redor de Orlando) ----
    # O sistema consulta CADA CEP (raio 50 mi) e junta os resultados, removendo
    # duplicados. O geofiltro (search.radius_km = 180) faz o corte fino no fim.
    postal_codes:
      - "32801"   # Orlando (centro)
      - "34711"   # Clermont (oeste)
      - "34741"   # Kissimmee (sul)
      - "32771"   # Sanford (norte)
      - "34748"   # Leesburg (noroeste)
      - "32114"   # Daytona Beach (nordeste/litoral)
      - "32935"   # Melbourne (leste/litoral)
      - "33801"   # Lakeland (sudoeste)
      - "34470"   # Ocala (norte)
      - "33880"   # Winter Haven (sul/sudoeste)

    # Onde está a LISTA de resultados no JSON da resposta (tenta na ordem).
    # Inclui caminhos das versões v2 e v3 da API para robustez.
    results_paths:
      - data
      - listings
      - results
      - properties
      - data.home_search.results   # schema v3 / Realtor
      - data.results

    # Mapeamento campo_da_listagem -> caminho(s) no item (tenta na ordem).
    fields:
      id:            [property_id, zpid, listing_id, id, mlsId, mls.id]
      price:         [price, list_price, listPrice, unformattedPrice]
      lat:           [address.lat, location.address.coordinate.lat, coordinate.lat, latitude, lat]
      lng:           [address.lon, address.lng, location.address.coordinate.lon, coordinate.lng, longitude, lng, lon]
      address:       [address.line, location.address.line, address.streetAddress, streetAddress, address, full_address]
      lot_size_sqft: [lot_size.size, lot_size.sqft, lot_sqft, lotSize, lotAreaValue]
      property_type: [propertyType, property_type, homeType, type]
      zoning:        [zoning, zoning_description]
      listing_date:  [list_date, listing_date, listed_date, datePostedString]
      url:           [detailUrl, hdpUrl, rdc_web_url, href, permalink, url]
